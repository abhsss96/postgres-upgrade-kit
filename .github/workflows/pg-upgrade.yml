name: PostgreSQL Upgrade Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Build and push all upgrade images to DockerHub ────────────────────────
  build-and-push:
    name: Build ${{ matrix.upgrade.tag }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        upgrade:
          # ── From 9.6 ──────────────────────────────────────────────────────
          - { tag: "9.6-to-12",  dockerfile: "upgrades/9.6-to-12/Dockerfile"  }
          - { tag: "9.6-to-13",  dockerfile: "upgrades/9.6-to-13/Dockerfile"  }
          - { tag: "9.6-to-14",  dockerfile: "upgrades/9.6-to-14/Dockerfile"  }
          - { tag: "9.6-to-15",  dockerfile: "upgrades/9.6-to-15/Dockerfile"  }
          - { tag: "9.6-to-16",  dockerfile: "upgrades/9.6-to-16/Dockerfile"  }
          # ── From 10 ───────────────────────────────────────────────────────
          - { tag: "10-to-14",   dockerfile: "upgrades/10-to-14/Dockerfile"   }
          - { tag: "10-to-15",   dockerfile: "upgrades/10-to-15/Dockerfile"   }
          - { tag: "10-to-16",   dockerfile: "upgrades/10-to-16/Dockerfile"   }
          # ── From 11 ───────────────────────────────────────────────────────
          - { tag: "11-to-14",   dockerfile: "upgrades/11-to-14/Dockerfile"   }
          - { tag: "11-to-15",   dockerfile: "upgrades/11-to-15/Dockerfile"   }
          - { tag: "11-to-16",   dockerfile: "upgrades/11-to-16/Dockerfile"   }
          # ── From 12 ───────────────────────────────────────────────────────
          - { tag: "12-to-14",   dockerfile: "upgrades/12-to-14/Dockerfile"   }
          - { tag: "12-to-15",   dockerfile: "upgrades/12-to-15/Dockerfile"   }
          - { tag: "12-to-16",   dockerfile: "upgrades/12-to-16/Dockerfile"   }
          # ── From 13 ───────────────────────────────────────────────────────
          - { tag: "13-to-15",   dockerfile: "upgrades/13-to-15/Dockerfile"   }
          - { tag: "13-to-16",   dockerfile: "upgrades/13-to-16/Dockerfile"   }
          # ── From 14 ───────────────────────────────────────────────────────
          - { tag: "14-to-16",   dockerfile: "upgrades/14-to-16/Dockerfile"   }
          # ── From 15 ───────────────────────────────────────────────────────
          - { tag: "15-to-16",   dockerfile: "upgrades/15-to-16/Dockerfile"   }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.upgrade.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}
          cache-to: type=inline

  # ── Run the full upgrade pipeline for every path ──────────────────────────
  test-upgrade:
    name: Test ${{ matrix.upgrade.tag }}
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      fail-fast: false
      matrix:
        upgrade:
          - { tag: "9.6-to-12",  from: "9.6",  to: "12"  }
          - { tag: "9.6-to-13",  from: "9.6",  to: "13"  }
          - { tag: "9.6-to-14",  from: "9.6",  to: "14"  }
          - { tag: "9.6-to-15",  from: "9.6",  to: "15"  }
          - { tag: "9.6-to-16",  from: "9.6",  to: "16"  }
          - { tag: "10-to-14",   from: "10",   to: "14"  }
          - { tag: "10-to-15",   from: "10",   to: "15"  }
          - { tag: "10-to-16",   from: "10",   to: "16"  }
          - { tag: "11-to-14",   from: "11",   to: "14"  }
          - { tag: "11-to-15",   from: "11",   to: "15"  }
          - { tag: "11-to-16",   from: "11",   to: "16"  }
          - { tag: "12-to-14",   from: "12",   to: "14"  }
          - { tag: "12-to-15",   from: "12",   to: "15"  }
          - { tag: "12-to-16",   from: "12",   to: "16"  }
          - { tag: "13-to-15",   from: "13",   to: "15"  }
          - { tag: "13-to-16",   from: "13",   to: "16"  }
          - { tag: "14-to-16",   from: "14",   to: "16"  }
          - { tag: "15-to-16",   from: "15",   to: "16"  }

    steps:
      - name: Pull image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}

      - name: Create volumes
        run: |
          docker volume create pg-old-${{ matrix.upgrade.from }}
          docker volume create pg-new-${{ matrix.upgrade.to }}

      - name: Init PostgreSQL ${{ matrix.upgrade.from }}
        run: |
          docker run --rm \
            -v pg-old-${{ matrix.upgrade.from }}:/var/lib/postgresql/${{ matrix.upgrade.from }}/main \
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            init-old

      - name: Upgrade ${{ matrix.upgrade.from }} → ${{ matrix.upgrade.to }}
        run: |
          docker run --rm \
            -v pg-old-${{ matrix.upgrade.from }}:/var/lib/postgresql/${{ matrix.upgrade.from }}/main \
            -v pg-new-${{ matrix.upgrade.to }}:/var/lib/postgresql/${{ matrix.upgrade.to }}/main \
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            upgrade

      - name: Verify PostgreSQL ${{ matrix.upgrade.to }}
        run: |
          docker run --rm \
            -v pg-new-${{ matrix.upgrade.to }}:/var/lib/postgresql/${{ matrix.upgrade.to }}/main \
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            verify

      - name: Cleanup
        if: always()
        run: |
          docker volume rm pg-old-${{ matrix.upgrade.from }} pg-new-${{ matrix.upgrade.to }} || true
