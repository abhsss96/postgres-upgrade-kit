name: PostgreSQL Upgrade Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Build and push all upgrade images ────────────────────────────────────
  # Pushes to GHCR (for CI test job — no rate limits) and DockerHub (public).
  # GHA layer cache avoids re-pulling postgres base images on every run.
  build-and-push:
    name: Build ${{ matrix.upgrade.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        upgrade:
          # ── From 9.6 (EOL, frozen image — no distro suffix) ──────────────
          # Runtime bullseye for libssl1.1 compatibility with old binaries.
          - { tag: "9.6-to-12",  from: "9.6",  to: "12",  old_distro: "",          distro: "bullseye" }
          - { tag: "9.6-to-13",  from: "9.6",  to: "13",  old_distro: "",          distro: "bullseye" }
          - { tag: "9.6-to-14",  from: "9.6",  to: "14",  old_distro: "",          distro: "bullseye" }
          - { tag: "9.6-to-15",  from: "9.6",  to: "15",  old_distro: "",          distro: "bullseye" }
          - { tag: "9.6-to-16",  from: "9.6",  to: "16",  old_distro: "",          distro: "bullseye" }
          # ── From 10 (EOL, frozen image — no distro suffix) ───────────────
          - { tag: "10-to-14",   from: "10",   to: "14",  old_distro: "",          distro: "bullseye" }
          - { tag: "10-to-15",   from: "10",   to: "15",  old_distro: "",          distro: "bullseye" }
          - { tag: "10-to-16",   from: "10",   to: "16",  old_distro: "",          distro: "bullseye" }
          # ── From 11 (EOL, frozen image — no distro suffix) ───────────────
          - { tag: "11-to-14",   from: "11",   to: "14",  old_distro: "",          distro: "bullseye" }
          - { tag: "11-to-15",   from: "11",   to: "15",  old_distro: "",          distro: "bullseye" }
          - { tag: "11-to-16",   from: "11",   to: "16",  old_distro: "",          distro: "bullseye" }
          # ── From 12–15 (active/recent — pin to bookworm to avoid trixie) ─
          # postgres:12-15 untagged now defaults to Debian trixie (GLIBC 2.38)
          # but our bookworm runtime only has GLIBC 2.36; pin old image to
          # bookworm so binaries and runtime share the same GLIBC.
          - { tag: "12-to-14",   from: "12",   to: "14",  old_distro: "-bookworm", distro: "bookworm" }
          - { tag: "12-to-15",   from: "12",   to: "15",  old_distro: "-bookworm", distro: "bookworm" }
          - { tag: "12-to-16",   from: "12",   to: "16",  old_distro: "-bookworm", distro: "bookworm" }
          - { tag: "13-to-15",   from: "13",   to: "15",  old_distro: "-bookworm", distro: "bookworm" }
          - { tag: "13-to-16",   from: "13",   to: "16",  old_distro: "-bookworm", distro: "bookworm" }
          - { tag: "14-to-16",   from: "14",   to: "16",  old_distro: "-bookworm", distro: "bookworm" }
          - { tag: "15-to-16",   from: "15",   to: "16",  old_distro: "-bookworm", distro: "bookworm" }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            OLD_PG_IMAGE=postgres:${{ matrix.upgrade.from }}${{ matrix.upgrade.old_distro }}
            OLD_PG_VERSION=${{ matrix.upgrade.from }}
            NEW_PG_VERSION=${{ matrix.upgrade.to }}
            NEW_PG_DISTRO=${{ matrix.upgrade.distro }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}
          cache-from: |
            type=gha,scope=${{ matrix.upgrade.tag }}
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.upgrade.tag }}

  # ── Run the full upgrade pipeline for every path ──────────────────────────
  # Pulls from GHCR to avoid DockerHub rate limits entirely.
  test-upgrade:
    name: Test ${{ matrix.upgrade.tag }}
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        upgrade:
          - { tag: "9.6-to-12",  from: "9.6",  to: "12"  }
          - { tag: "9.6-to-13",  from: "9.6",  to: "13"  }
          - { tag: "9.6-to-14",  from: "9.6",  to: "14"  }
          - { tag: "9.6-to-15",  from: "9.6",  to: "15"  }
          - { tag: "9.6-to-16",  from: "9.6",  to: "16"  }
          - { tag: "10-to-14",   from: "10",   to: "14"  }
          - { tag: "10-to-15",   from: "10",   to: "15"  }
          - { tag: "10-to-16",   from: "10",   to: "16"  }
          - { tag: "11-to-14",   from: "11",   to: "14"  }
          - { tag: "11-to-15",   from: "11",   to: "15"  }
          - { tag: "11-to-16",   from: "11",   to: "16"  }
          - { tag: "12-to-14",   from: "12",   to: "14"  }
          - { tag: "12-to-15",   from: "12",   to: "15"  }
          - { tag: "12-to-16",   from: "12",   to: "16"  }
          - { tag: "13-to-15",   from: "13",   to: "15"  }
          - { tag: "13-to-16",   from: "13",   to: "16"  }
          - { tag: "14-to-16",   from: "14",   to: "16"  }
          - { tag: "15-to-16",   from: "15",   to: "16"  }

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}

      - name: Create volumes
        run: |
          docker volume create pg-old-${{ matrix.upgrade.from }}
          docker volume create pg-new-${{ matrix.upgrade.to }}
          docker volume create pg-reports

      - name: Init PostgreSQL ${{ matrix.upgrade.from }}
        run: |
          docker run --rm \
            -v pg-old-${{ matrix.upgrade.from }}:/var/lib/postgresql/${{ matrix.upgrade.from }}/main \
            -v pg-reports:/reports \
            ghcr.io/${{ github.repository_owner }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            init-old

      - name: Upgrade ${{ matrix.upgrade.from }} → ${{ matrix.upgrade.to }}
        run: |
          docker run --rm \
            -v pg-old-${{ matrix.upgrade.from }}:/var/lib/postgresql/${{ matrix.upgrade.from }}/main \
            -v pg-new-${{ matrix.upgrade.to }}:/var/lib/postgresql/${{ matrix.upgrade.to }}/main \
            -v pg-reports:/reports \
            ghcr.io/${{ github.repository_owner }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            upgrade

      - name: Verify PostgreSQL ${{ matrix.upgrade.to }}
        run: |
          docker run --rm \
            -v pg-new-${{ matrix.upgrade.to }}:/var/lib/postgresql/${{ matrix.upgrade.to }}/main \
            -v pg-reports:/reports \
            ghcr.io/${{ github.repository_owner }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            verify

      - name: Publish upgrade summary
        if: always()
        run: |
          docker run --rm --entrypoint cat \
            -v pg-reports:/reports \
            ghcr.io/${{ github.repository_owner }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            /reports/upgrade.md >> "$GITHUB_STEP_SUMMARY" \
          || echo "_No upgrade report generated._" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          docker volume rm pg-old-${{ matrix.upgrade.from }} pg-new-${{ matrix.upgrade.to }} pg-reports || true
